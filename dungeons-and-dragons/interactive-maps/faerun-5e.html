<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Faerûn Interactive Hex Faction Map</title>

<!--
Base map source requested by user:
Official Wizards of the Coast Sword Coast / NW Faerûn high-res map
https://media.wizards.com/2015/images/dnd/resources/Sword-Coast-Map_HighRes.jpg
Referenced via user prompt / publicly available map. :contentReference[oaicite:0]{index=0}
-->

<style>
  :root{
    --bg:#10151c;
    --panel:#18212b;
    --line:#d7e3f4;
    --muted:#9fb3c8;
    --accent:#63b3ff;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
  }

  #app{
    display:grid;
    grid-template-columns: 320px 1fr;
    height:100vh;
  }

  #sidebar{
    background:var(--panel);
    border-right:1px solid #2c3a4a;
    padding:16px;
    overflow:auto;
  }

  #sidebar h1{
    margin:0 0 10px;
    font-size:22px;
  }

  .small{
    color:var(--muted);
    font-size:13px;
    line-height:1.4;
    margin-bottom:14px;
  }

  .section{
    margin:16px 0;
    padding:12px;
    border:1px solid #2b3948;
    border-radius:12px;
    background:#131c25;
  }

  .section h2{
    font-size:15px;
    margin:0 0 8px;
  }

  label{
    display:block;
    font-size:13px;
    margin:8px 0 4px;
    color:#d4e3f5;
  }

  input, select, button, textarea{
    width:100%;
    border-radius:8px;
    border:1px solid #36475a;
    background:#0f1720;
    color:#fff;
    padding:8px 10px;
    font-size:14px;
  }

  button{
    cursor:pointer;
    background:#1d2b39;
    transition:0.2s;
    margin-top:8px;
  }

  button:hover{
    background:#274157;
  }

  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  #mapWrap{
    position:relative;
    overflow:hidden;
    background:#0a0e14;
  }

  #viewport{
    position:absolute;
    inset:0;
    cursor:grab;
    touch-action:none;
  }

  #viewport.dragging{ cursor:grabbing; }

  #world{
    position:absolute;
    left:0;
    top:0;
    transform-origin:0 0;
  }

  #baseMap{
    display:block;
    user-select:none;
    pointer-events:none;
  }

  #hexCanvas{
    position:absolute;
    left:0;
    top:0;
  }

  #hoverInfo{
    position:absolute;
    right:16px;
    bottom:16px;
    padding:10px 12px;
    background:rgba(10,16,24,.88);
    border:1px solid #314050;
    border-radius:10px;
    min-width:180px;
    font-size:14px;
  }
  
  #toggleSidebar{
  width:100%;
  margin-bottom:12px;
  background:#274157;
  }

  #app.collapsed{
    grid-template-columns: 0px 1fr;
  }

  #app.collapsed #sidebar{
    overflow:hidden;
    padding:0;
    border-right:none;
  }

  #app.collapsed #sidebar *:not(#toggleSidebar){
    display:none;
  }

  #app.collapsed #toggleSidebar{
    position:absolute;
    left:8px;
    top:8px;
    width:auto;
    z-index:999;
    display:block;
  }
  
  #app{
    transition:grid-template-columns .25s ease;
  }

  #sidebar{
    transition:padding .25s ease;
  }

  .legendItem{
    display:flex;
    align-items:center;
    gap:8px;
    margin:6px 0;
    font-size:13px;
  }

  .sw{
    width:14px;height:14px;border-radius:3px;
  }

  code{
    color:#8cd6ff;
  }
</style>
</head>
<body>
<div id="app">

  <aside id="sidebar">
  <button id="toggleSidebar">☰ Hide Panel</button>
    <h1>Resistance War Map</h1>
    <div class="small">
      Interactive faction territory overlay on the official Sword Coast / NW Faerûn map.
    </div>

    <div class="section" style="display: none;">
      <h2>Grid Settings</h2>

      <label>Hex Size</label>
      <input type="range" min="18" max="80" value="34" id="hexSize">

      <label>Opacity</label>
      <input type="range" min="0" max="100" value="42" id="opacity">

      <button id="regen">Rebuild Grid</button>
      <button id="toggleGrid">Toggle Grid</button>
    </div>

    <div class="section">
      <h2>Legend: Faction Name</h2>
	  
      <label style="display: none;">Faction Name</label>
	  
      <input id="fName" value="Lords' Alliance" style="display: none;">

      <label style="display: none;">Faction Color</label>
      <input type="color" id="fColor" value="#4ea7ff" style="display: none;">

      <button id="saveFaction" style="display: none;">Save / Update Faction</button>

      <label style="display: none;">Choose Active Faction</label>
      <select id="factions" style="display: none;"></select>

      <div class="row">
        <button id="paintMode"style="display: none;">Paint</button>
        <button id="eraseMode"style="display: none;">Erase</button>
      </div>
	  
      <div id="legend"></div>
    </div>

    <div class="section" style="display: none;">
      <h2>Data</h2>
      <button id="exportBtn">Export JSON</button>
      <button id="importBtn">Import JSON</button>
      <textarea id="dataBox" rows="8" placeholder="Paste JSON here"></textarea>
    </div>

    <div class="section">
      <h2>Controls</h2>
      <div class="small">
        Mouse wheel = zoom<br>
        Drag background = pan
      </div>
    </div>
  </aside>

  <main id="mapWrap">
    <div id="viewport">
      <div id="world">
        <img
		  id="baseMap"
		  src="Sword-Coast-Map_HighRes.jpg"
		>
        <canvas id="hexCanvas"></canvas>
      </div>
    </div>

    <div id="hoverInfo">
      Hover: <span id="hoverText">—</span>
    </div>
  </main>

</div>

// view transform
let scale = 0.15;
let panX = 0;
let panY = 0;

// grid
let HEX_SIZE = 34;
let SHOW_GRID = true;
let ALPHA = 0.42;

const img = document.getElementById("baseMap");
const canvas = document.getElementById("hexCanvas");
const ctx = canvas.getContext("2d");
const world = document.getElementById("world");
const viewport = document.getElementById("viewport");

function init(){
  refreshFactionUI();

  img.onload = ()=>{
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    world.style.width = img.naturalWidth + "px";
    world.style.height = img.naturalHeight + "px";
    centerMap();
    draw();
  };

  if(img.complete && img.naturalWidth) img.onload();

  bindUI();
}
init();

/* =========================
   Hex Math (pointy top axial)
========================= */

function hexToPixel(q,r){
  const x = HEX_SIZE * Math.sqrt(3) * (q + r/2);
  const y = HEX_SIZE * 1.5 * r;
  return {x,y};
}

function pixelToHex(x,y){
  const q = ((Math.sqrt(3)/3 * x) - (1/3 * y)) / HEX_SIZE;
  const r = (2/3 * y) / HEX_SIZE;
  return hexRound(q,r);
}

function hexRound(q,r){
  let x=q, z=r, y=-x-z;

  let rx=Math.round(x), ry=Math.round(y), rz=Math.round(z);

  let x_diff=Math.abs(rx-x);
  let y_diff=Math.abs(ry-y);
  let z_diff=Math.abs(rz-z);

  if(x_diff > y_diff && x_diff > z_diff) rx = -ry-rz;
  else if(y_diff > z_diff) ry = -rx-rz;
  else rz = -rx-ry;

  return {q:rx, r:rz};
}

function hexCorners(cx,cy){
  const pts=[];
  for(let i=0;i<6;i++){
    const angle = Math.PI/180 * (60*i - 30);
    pts.push({
      x: cx + HEX_SIZE*Math.cos(angle),
      y: cy + HEX_SIZE*Math.sin(angle)
    });
  }
  return pts;
}

/* =========================
   Drawing
========================= */

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cols = Math.ceil(canvas.width / (HEX_SIZE*1.6)) + 4;
  const rows = Math.ceil(canvas.height / (HEX_SIZE*1.4)) + 4;

  // Fill ownership first
  for(const key in ownership){
    const [q,r] = key.split(",").map(Number);
    drawHex(q,r,true);
  }

  if(SHOW_GRID){
    for(let r=-2;r<rows;r++){
      for(let q=-2;q<cols;q++){
        drawHex(q,r,false);
      }
    }
  }

  applyTransform();
}

function drawHex(q,r,filled){
  const {x,y}=hexToPixel(q,r);
  const pts=hexCorners(x,y);

  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<6;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();

  const key = `${q},${r}`;
  const owner = ownership[key];

  if(filled && owner){
    ctx.fillStyle = hexToRGBA(factions[owner] || "#ffffff", ALPHA);
    ctx.fill();
  }

  // border logic: thicker if adjacent faction changes
  let lineW = 0.55;
  let stroke = "rgba(255,255,255,.18)";

  if(owner){
    lineW = 1.2;
    stroke = "rgba(255,255,255,.35)";
  }

  ctx.lineWidth = lineW;
  ctx.strokeStyle = stroke;
  ctx.stroke();

  // Distinct territorial borders
  if(owner){
    const dirs = [
      [1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]
    ];

    dirs.forEach((d,i)=>{
      const nk = `${q+d[0]},${r+d[1]}`;
      const nOwner = ownership[nk];
      if(nOwner !== owner){
        const a = pts[i];
        const b = pts[(i+1)%6];
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.lineWidth = 3;
        ctx.strokeStyle = factions[owner];
        ctx.stroke();
      }
    });
  }
}

function hexToRGBA(hex,a){
  const n = hex.replace("#","");
  const r=parseInt(n.substring(0,2),16);
  const g=parseInt(n.substring(2,4),16);
  const b=parseInt(n.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyTransform(){

  const wrap = document.getElementById("mapWrap");
  const viewW = wrap.clientWidth;
  const viewH = wrap.clientHeight;

  const mapW = canvas.width * scale;
  const mapH = canvas.height * scale;

  // Prevent dragging too far away
  const minX = Math.min(0, viewW - mapW);
  const minY = Math.min(0, viewH - mapH);

  const maxX = 0;
  const maxY = 0;

  panX = Math.max(minX, Math.min(maxX, panX));
  panY = Math.max(minY, Math.min(maxY, panY));

  world.style.transform =
    `translate(${panX}px,${panY}px) scale(${scale})`;
}

/* =========================
   Interaction
========================= */

let dragging=false;
let paintDrag=false;
let lastX=0,lastY=0;

viewport.addEventListener("mousedown",(e)=>{
  if(e.shiftKey){
    paintDrag=true;
    paintAtEvent(e);
    return;
  }
  dragging=true;
  viewport.classList.add("dragging");
  lastX=e.clientX;
  lastY=e.clientY;
});

window.addEventListener("mouseup",()=>{
  dragging=false;
  paintDrag=false;
  viewport.classList.remove("dragging");
});

window.addEventListener("mousemove",(e)=>{
  if(dragging){
    panX += e.clientX-lastX;
    panY += e.clientY-lastY;
    lastX=e.clientX;
    lastY=e.clientY;
    applyTransform();
  }

  if(paintDrag) paintAtEvent(e);

  hoverAtEvent(e);
});

let touchMode = false;
let lastTouchDist = 0;

viewport.addEventListener("touchstart", (e) => {

  if (e.touches.length === 1) {
    touchMode = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }

  if (e.touches.length === 2) {
    touchMode = false;
    lastTouchDist = getTouchDistance(e.touches);
  }

}, { passive:false });


viewport.addEventListener("touchmove", (e) => {
  e.preventDefault();

  // one finger pan
  if (e.touches.length === 1 && touchMode) {

    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;

    panX += x - lastX;
    panY += y - lastY;

    lastX = x;
    lastY = y;

    applyTransform();
  }

  // pinch zoom
  if (e.touches.length === 2) {

    const dist = getTouchDistance(e.touches);

    if (lastTouchDist > 0) {
      const ratio = dist / lastTouchDist;
      scale *= ratio;
      scale = Math.max(1, Math.min(3, scale));
      applyTransform();
    }

    lastTouchDist = dist;
  }

}, { passive:false });


viewport.addEventListener("touchend", () => {
  touchMode = false;
  lastTouchDist = 0;
});


function getTouchDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

viewport.addEventListener("touchend",(e)=>{
  if(e.changedTouches.length===1){
    hoverAtEvent({
      clientX:e.changedTouches[0].clientX,
      clientY:e.changedTouches[0].clientY
    });
  }
});

//viewport.addEventListener("click",(e)=> paintAtEvent(e));

viewport.addEventListener("wheel",(e)=>{
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1.08 : 0.92;
  scale *= delta;
  scale = Math.max(0.15, Math.min(3, scale));
  applyTransform();
},{passive:false});

function screenToMap(clientX,clientY){
  const rect = viewport.getBoundingClientRect();
  const x = (clientX - rect.left - panX) / scale;
  const y = (clientY - rect.top - panY) / scale;
  return {x,y};
}

function paintAtEvent(e){
  const p = screenToMap(e.clientX,e.clientY);
  const h = pixelToHex(p.x,p.y);
  const key = `${h.q},${h.r}`;

  if(mode==="erase") delete ownership[key];
  else ownership[key]=activeFaction;

  draw();
}

function hoverAtEvent(e){
  const p = screenToMap(e.clientX,e.clientY);
  const h = pixelToHex(p.x,p.y);
  const key = `${h.q},${h.r}`;
  const owner = ownership[key] || "Unclaimed";
  document.getElementById("hoverText").textContent =
    `Hex ${key} • ${owner}`;
}

/* =========================
   UI
========================= */

function bindUI(){
  document.getElementById("saveFaction").onclick=()=>{
    const n = document.getElementById("fName").value.trim();
    const c = document.getElementById("fColor").value;
    if(!n) return;
    factions[n]=c;
    activeFaction=n;
    refreshFactionUI();
    draw();
  };

  document.getElementById("paintMode").onclick=()=>mode="paint";
  document.getElementById("eraseMode").onclick=()=>mode="erase";

  document.getElementById("factions").onchange=(e)=>{
    activeFaction=e.target.value;
  };

  document.getElementById("hexSize").oninput=(e)=>{
    HEX_SIZE = +e.target.value;
    draw();
  };

  document.getElementById("opacity").oninput=(e)=>{
    ALPHA = (+e.target.value)/100;
    draw();
  };

  document.getElementById("regen").onclick=draw;

  document.getElementById("toggleGrid").onclick=()=>{
    SHOW_GRID=!SHOW_GRID;
    draw();
  };

  document.getElementById("exportBtn").onclick=()=>{
    const payload = {
      hexSize:HEX_SIZE,
      opacity:ALPHA,
      factions,
      ownership
    };
    document.getElementById("dataBox").value =
      JSON.stringify(payload,null,2);
  };

  document.getElementById("importBtn").onclick=()=>{
    try{
      const data = JSON.parse(document.getElementById("dataBox").value);
      Object.assign(factions,data.factions||{});
      ownership = data.ownership || {};
      HEX_SIZE = data.hexSize || HEX_SIZE;
      ALPHA = data.opacity ?? ALPHA;
      document.getElementById("hexSize").value = HEX_SIZE;
      document.getElementById("opacity").value = ALPHA*100;
      refreshFactionUI();
      draw();
    }catch(err){
      alert("Invalid JSON");
    }
  };
  
  document.getElementById("toggleSidebar").onclick=()=>{
	  const app = document.getElementById("app");
	  const btn = document.getElementById("toggleSidebar");

	  app.classList.toggle("collapsed");

	  btn.textContent =
		app.classList.contains("collapsed")
		? "☰ Show Panel"
		: "☰ Hide Panel";

	  setTimeout(()=>applyTransform(), 50);
	};
}

function refreshFactionUI(){
  const sel = document.getElementById("factions");
  sel.innerHTML="";
  Object.keys(factions).forEach(name=>{
    if(name==="None") return;
    const o=document.createElement("option");
    o.value=name;
    o.textContent=name;
    if(name===activeFaction) o.selected=true;
    sel.appendChild(o);
  });

  const legend=document.getElementById("legend");
  legend.innerHTML="";
  Object.entries(factions).forEach(([name,color])=>{
    if(name==="None") return;
    const d=document.createElement("div");
    d.className="legendItem";
    d.innerHTML=`<div class="sw" style="background:${color}"></div>${name}`;
    legend.appendChild(d);
  });
}

function centerMap(){
  const wrap = document.getElementById("mapWrap");

  const viewW = wrap.clientWidth;
  const viewH = wrap.clientHeight;

  const mapW = canvas.width * scale;
  const mapH = canvas.height * scale;

  panX = (viewW - mapW) / 2;
  panY = (viewH - mapH) / 2;

  applyTransform();
}
